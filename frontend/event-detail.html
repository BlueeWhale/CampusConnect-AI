<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    Event Details
  </title>

  <link
    rel="stylesheet"
    href="css/ticket.css"
  >

</head>

<body>

  <div class="event-container">

    <!-- EVENT IMAGE -->
    <div class="event-image">

      <img
        id="eventImage"
        src=""
      >

    </div>

    <!-- CONTENT -->
    <div class="event-content">

      <h1 id="eventTitle">
        Loading...
      </h1>

      <p
        class="date"
        id="eventDate"
      ></p>

      <p
        class="location"
        id="eventLocation"
      ></p>

      <p
        class="desc"
        id="eventDescription"
      ></p>

      <div
        class="price"
        id="eventPrice"
      ></div>

      <button id="buyTicketBtn">
        Buy Ticket 🎫
      </button>

    </div>

  </div>

  <script src="js/ticket.js"></script>

</body>

</html>
